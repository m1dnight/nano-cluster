<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>nano cluster overview</title>
<!--
  The cluster overview - a single self-contained page that runs in your
  browser, NOT on the nodes. Open it from disk (just overview), give it
  the IP of any node, and it walks outward from there: every node's
  GET /api/network response names its peers, whose names carry their IPs
  (nano@10.0.0.8), so one seed discovers the whole mesh. Each node is
  then polled for its cluster view and its queue occupancy every 2s.
  The nodes' API allows any origin (CORS), which is what lets a page
  served from a laptop read the boards' replies.

  What the page shows, and where each fact comes from:
    * the nodes            - one card per discovered node
    * the peer they picked  - each node's own view.leader (every node
                              independently elects the highest online node,
                              so "selected peer" is that per-node choice)
    * who is the leader     - the peer a majority of nodes agree on
    * a primes form         - POST /api/work with the JobDescription.Primes
                              payload the API decodes

  The API this page speaks to (NanoCluster.Web.Api):
    GET  /api/network     -> {node, leader, peers:{name:"online"|"offline"}}
    GET  /api/work/queue  -> {job_count, completed_count,
                              queue_stats:{todo, pending, finished}}
    GET  /api/work/jobs   -> {jobs:[{job_id, description, result}]}  (completed)
    POST /api/work        -> {job:"#Reference<...>"}   on success
                             body: {"job":"Elixir.NanoCluster.JobDescription.Primes",
                                    "arguments":{"start":_,"end":_,"chunk_size":_}}
-->
<style>
  :root {
    --page: #f9f9f7;
    --surface: #fcfcfb;
    --ink: #0b0b0b;
    --ink-2: #52514e;
    --muted: #898781;
    --hairline: rgba(11, 11, 11, 0.10);
    --good: #0ca30c;
    --warning: #fab219;
    --critical: #d03b3b;
    --accent: #2a78d6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page: #0d0d0d;
      --surface: #1a1a19;
      --ink: #ffffff;
      --ink-2: #c3c2b7;
      --muted: #898781;
      --hairline: rgba(255, 255, 255, 0.10);
      --accent: #3987e5;
    }
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--page);
    color: var(--ink);
    font: 15px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  main { max-width: 980px; margin: 0 auto; padding: 0 20px 40px; }

  header {
    max-width: 980px;
    margin: 0 auto;
    padding: 24px 20px 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: baseline;
    justify-content: space-between;
  }
  h1 { font-size: 20px; font-weight: 650; margin: 0; }
  h1 span { color: var(--muted); font-weight: 400; }

  #seed-form { display: flex; gap: 8px; }
  #seed {
    width: 190px;
    padding: 6px 10px;
    border: 1px solid var(--hairline);
    border-radius: 8px;
    background: var(--surface);
    color: var(--ink);
    font: inherit;
  }
  #seed-form button {
    padding: 6px 14px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    font: inherit;
    font-weight: 550;
    cursor: pointer;
  }

  #hint { color: var(--ink-2); margin: 24px 2px; }
  code { font-size: 0.92em; }

  /* --- summary tiles ------------------------------------------------ */
  #tiles {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin: 16px 0 24px;
  }
  .tile {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .tile .label { color: var(--ink-2); font-size: 13px; }
  .tile .value { font-size: 26px; font-weight: 600; margin-top: 2px; }
  .tile .value.small { font-size: 17px; word-break: break-all; }
  .tile .note { font-size: 12px; margin-top: 2px; color: var(--ink-2); }

  /* --- section headings ---------------------------------------------- */
  .section-title {
    font-size: 12px;
    font-weight: 650;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 10px;
  }

  /* --- submit form --------------------------------------------------- */
  #submit-wrap { margin-bottom: 24px; }
  .task {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .task h2 { font-size: 15px; font-weight: 650; margin: 0; }
  .task .desc { margin: 6px 0 14px; font-size: 13px; color: var(--ink-2); }
  .task .fields {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px 14px;
  }
  .field { display: flex; flex-direction: column; gap: 4px; font-size: 13px; }
  .field .name { color: var(--muted); }
  .field input {
    padding: 6px 9px;
    border: 1px solid var(--hairline);
    border-radius: 8px;
    background: var(--page);
    color: var(--ink);
    font: inherit;
    font-size: 13px;
  }
  .task .actions {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 14px;
  }
  .task button {
    padding: 6px 14px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    font: inherit;
    font-weight: 550;
    cursor: pointer;
  }
  .task .result { font-size: 13px; }
  .task .target { font-size: 12px; color: var(--muted); margin-left: auto; }

  /* --- jobs ----------------------------------------------------------- */
  #jobs-wrap { margin-bottom: 24px; }
  #jobs {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    padding: 6px 16px;
  }
  .job-row {
    display: grid;
    grid-template-columns: 1fr max-content max-content;
    gap: 14px;
    align-items: baseline;
    padding: 8px 0;
    font-size: 13px;
    border-top: 1px solid var(--hairline);
  }
  .job-row:first-child { border-top: none; }
  .job-row .muted { color: var(--muted); }
  .job-id { font-size: 11px; color: var(--muted); }

  /* --- node cards ---------------------------------------------------- */
  #cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .card.gone .body { opacity: 0.55; }
  .card h2 {
    font-size: 15px;
    font-weight: 650;
    margin: 0;
    word-break: break-all;
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: space-between;
  }
  .badge {
    font-size: 11px;
    font-weight: 650;
    letter-spacing: 0.03em;
    color: var(--accent);
    border: 1px solid currentcolor;
    border-radius: 999px;
    padding: 1px 8px;
    white-space: nowrap;
  }
  .chip { font-size: 13px; color: var(--ink-2); white-space: nowrap; }
  .dot { font-size: 11px; }
  .dot.good { color: var(--good); }
  .dot.warning { color: var(--warning); }
  .dot.critical { color: var(--critical); }

  .card .rows { margin-top: 10px; font-size: 13px; }
  .row { display: flex; justify-content: space-between; gap: 12px; padding: 3px 0; }
  .row .k { color: var(--muted); white-space: nowrap; }
  .row .v { text-align: right; word-break: break-all; }
  .row .v .warn { color: var(--ink-2); }
  .peers { border-top: 1px solid var(--hairline); margin-top: 8px; padding-top: 6px; }
  .peers .cap { color: var(--muted); font-size: 12px; padding: 2px 0; }

  footer {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 20px 32px;
    color: var(--muted);
    font-size: 12px;
  }
  #refresh {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-right: 10px;
    color: var(--ink-2);
  }
  #refresh[hidden] { display: none; }
  .spinner {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 2px solid var(--hairline);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) {
    .spinner { animation-duration: 1.6s; }
  }
</style>
</head>
<body>
<header>
  <h1>nano cluster <span>overview</span></h1>
  <form id="seed-form">
    <input id="seed" placeholder="seed IP, e.g. 10.0.0.7" autocomplete="off" spellcheck="false">
    <button>watch</button>
  </form>
</header>
<main>
  <p id="hint">Enter the IP of any node. The page asks it for its cluster view,
    then follows the peer names (<code>nano@&lt;ip&gt;</code>) to discover and
    poll every other node.</p>
  <section id="tiles" hidden></section>
  <section id="submit-wrap" hidden>
    <h2 class="section-title">submit work</h2>
    <div id="submit"></div>
  </section>
  <section id="jobs-wrap" hidden>
    <h2 class="section-title">completed jobs</h2>
    <div id="jobs"></div>
  </section>
  <section id="cards"></section>
</main>
<footer>
  <span id="refresh" hidden><span class="spinner"></span> refreshing…</span>
  <span id="foot-text"></span>
</footer>

<script>
'use strict';

const POLL_MS = 2000;
const FETCH_TIMEOUT_MS = 1500;
// a node whose leader is unreachable stalls ~2s per push before replying
const SUBMIT_TIMEOUT_MS = 6000;

// Every node - board or host-run - serves its JSON API on this port.
const API_PORT = 8123;

// The one job type the API knows how to decode (NanoCluster.Web.Api.decode_job):
// String.to_atom(job) must resolve to the Primes module alias.
const PRIMES_JOB = 'Elixir.NanoCluster.JobDescription.Primes';
const PRIMES_DEFAULTS = { start: 0, end: 100000, chunk_size: 4000 };

// target -> {target, name, view, queue, jobs, ok, everSeen}
// A target is what we fetch from: "10.0.0.8:8123", or "localhost:8123" for
// a host-run node. `view`, `queue` and `jobs` keep the last good answer so
// a node that drops off is shown as it was, greyed, not erased.
const nodes = new Map();
let seed = null;

// "nano@10.0.0.8" -> "10.0.0.8:8123"; anything without an IPv4 host part
// (nonode@nohost) is not fetchable and yields null.
function targetOf(name) {
  const at = typeof name === 'string' ? name.indexOf('@') : -1;
  if (at < 0) return null;
  const host = name.slice(at + 1);
  return /^\d{1,3}(\.\d{1,3}){3}$/.test(host) ? `${host}:${API_PORT}` : null;
}

function nodeEntry(target) {
  let entry = nodes.get(target);
  if (!entry) {
    entry = { target, name: null, view: null, queue: null, jobs: null, ok: false, everSeen: false };
    nodes.set(target, entry);
  }
  return entry;
}

// Each node shares a tiny socket budget - about ten file descriptors, split
// across its HTTP API, UDP discovery and every Erlang distribution link - so a
// couple of overlapping requests can exhaust it and make the node's accept()
// fail (errno 23, ENFILE). To stay well clear of that, EVERY request this page
// makes - to any node, poll or submit - is funneled through this queue, so at
// most one HTTP request is ever in flight cluster-wide. Slower, on purpose.
let requestChain = Promise.resolve();
function serialize(task) {
  const run = requestChain.then(task, task);
  // Keep the chain alive whichever way this task settled; the caller still
  // gets the real result (or error) through `run`.
  requestChain = run.then(() => {}, () => {});
  return run;
}

function getJson(target, path) {
  return serialize(async () => {
    const control = new AbortController();
    // Start the timeout now that the request is actually running, not back
    // when it was queued behind other requests.
    const timer = setTimeout(() => control.abort(), FETCH_TIMEOUT_MS);
    try {
      const response = await fetch(`http://${target}${path}`, { signal: control.signal });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return await response.json();
    } finally {
      clearTimeout(timer);
    }
  });
}

async function pollNode(entry) {
  try {
    const [view, queue] = await Promise.all([
      getJson(entry.target, '/api/network'),
      getJson(entry.target, '/api/work/queue'),
    ]);
    Object.assign(entry, { view, queue, name: view.node, ok: true, everSeen: true });
    // Every peer name carries an IP - follow them to discover the rest of the
    // mesh. `peers` lists the OTHER nodes this one has heard from; the node
    // itself is in `view.node`, so seed it too in case it isn't its own peer.
    for (const peer of [view.node, ...Object.keys(view.peers || {})]) {
      const target = targetOf(peer);
      if (target) nodeEntry(target);
    }
  } catch (_err) {
    entry.ok = false;
    return;
  }
  // separate, so a node running firmware without the endpoint still renders
  try {
    entry.jobs = (await getJson(entry.target, '/api/work/jobs')).jobs || [];
  } catch (_err) { /* keep the last good list */ }
}

function setRefreshing(on) {
  const el = document.getElementById('refresh');
  if (el) el.hidden = !on;
}

let polling = false;
async function poll() {
  // One request at a time means a sweep of several nodes can outlast the poll
  // interval; skip this tick rather than queue a second sweep behind the first.
  if (document.hidden || !seed || polling) return;
  polling = true;
  setRefreshing(true);
  try {
    nodeEntry(seed);
    await Promise.all([...nodes.values()].map(pollNode));
    render();
  } finally {
    polling = false;
    setRefreshing(false);
  }
}

// ---- submitting work ------------------------------------------------
// One fixed form for the Primes job. The API decodes exactly this shape
// (a "job" module name plus a start/end/chunk_size arguments object), so
// the form is hardcoded rather than driven by a server catalog. Rendered
// once, on the first watch, so typing and focus survive the polling.

function renderSubmit() {
  const wrap = document.getElementById('submit-wrap');
  if (wrap.dataset.ready) { wrap.hidden = false; return; }
  wrap.dataset.ready = '1';
  wrap.hidden = false;
  document.getElementById('submit').innerHTML = `
    <form class="task" id="primes-form">
      <h2>Primes</h2>
      <p class="desc">Find every prime in <code>start..end</code>, split into
        <code>chunk_size</code>-wide tasks and spread across the workers.</p>
      <div class="fields">
        <label class="field">
          <span class="name">start</span>
          <input name="start" value="${PRIMES_DEFAULTS.start}" inputmode="numeric" autocomplete="off">
        </label>
        <label class="field">
          <span class="name">end</span>
          <input name="end" value="${PRIMES_DEFAULTS.end}" inputmode="numeric" autocomplete="off">
        </label>
        <label class="field">
          <span class="name">chunk_size</span>
          <input name="chunk_size" value="${PRIMES_DEFAULTS.chunk_size}" inputmode="numeric" autocomplete="off">
        </label>
      </div>
      <div class="actions">
        <button>queue primes</button>
        <span class="result" role="status"></span>
        <span class="target" id="submit-target"></span>
      </div>
    </form>`;
  document.getElementById('primes-form').addEventListener('submit', submitPrimes);
}

// Post to the leader if we can reach it - that is where the work should
// land - else to any online node so a click is never simply dropped.
function submitTarget() {
  const online = [...nodes.values()].filter(n => n.ok);
  const leader = online.find(n => n.name === consensus().leader);
  return leader || online[0] || null;
}

function postJson(target, path, payload) {
  return serialize(async () => {
    const control = new AbortController();
    const timer = setTimeout(() => control.abort(), SUBMIT_TIMEOUT_MS);
    try {
      const response = await fetch(`http://${target}${path}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        signal: control.signal,
      });
      // Success is JSON; httpd renders errors as a text/html "Error: ..." body,
      // so read text first and only parse when the status is good.
      const text = await response.text();
      if (!response.ok) throw new Error(text.trim() || `HTTP ${response.status}`);
      return JSON.parse(text);
    } finally {
      clearTimeout(timer);
    }
  });
}

async function submitPrimes(event) {
  event.preventDefault();
  const form = event.currentTarget;
  const result = form.querySelector('.result');

  const args = {};
  for (const name of ['start', 'end', 'chunk_size']) {
    const n = Number(form.elements[name].value.trim());
    if (!Number.isInteger(n)) {
      result.innerHTML = chip('warning', `${name} must be a whole number`);
      return;
    }
    args[name] = n;
  }
  if (args.start > args.end) {
    result.innerHTML = chip('warning', 'start must not exceed end');
    return;
  }
  if (args.chunk_size < 1) {
    result.innerHTML = chip('warning', 'chunk_size must be at least 1');
    return;
  }

  const node = submitTarget();
  if (!node) {
    result.innerHTML = chip('critical', 'no reachable node');
    return;
  }

  result.textContent = 'queueing…';
  try {
    const reply = await postJson(node.target, '/api/work', { job: PRIMES_JOB, arguments: args });
    const chunks = Math.ceil((args.end - args.start + 1) / args.chunk_size);
    result.innerHTML = chip('good', `queued on ${node.name || node.target} · ${chunks} task${chunks === 1 ? '' : 's'}`);
  } catch (err) {
    result.innerHTML = chip('critical', err.message || 'failed');
  }
}

// The leader most reachable nodes agree on; split views get a warning.
function consensus() {
  const votes = new Map();
  for (const n of nodes.values()) {
    if (n.ok && n.view) votes.set(n.view.leader, (votes.get(n.view.leader) || 0) + 1);
  }
  let leader = null;
  let best = 0;
  for (const [name, count] of votes) {
    if (count > best) { leader = name; best = count; }
  }
  return { leader, split: votes.size > 1 };
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[c]));
}

// Status is always a colored dot (shape differs too) plus a word - never
// color alone. The word stays in ink, the dot carries the color.
function chip(kind, word) {
  const dots = { good: '●', warning: '⚠', critical: '○' };
  return `<span class="chip"><span class="dot ${kind}">${dots[kind]}</span> ${escapeHtml(word)}</span>`;
}

function byTarget(a, b) {
  const numeric = t => t.split(/[.:]/).map(Number);
  const [av, bv] = [numeric(a.target), numeric(b.target)];
  for (let i = 0; i < Math.max(av.length, bv.length); i += 1) {
    const d = (av[i] || 0) - (bv[i] || 0);
    if (Number.isNaN(d)) return a.target.localeCompare(b.target);
    if (d !== 0) return d;
  }
  return 0;
}

// queue_stats lives one level down inside the /api/work/queue reply.
function queueStats(node) {
  return (node.queue && node.queue.queue_stats) || null;
}

function tile(label, value, opts = {}) {
  return `<div class="tile">
    <div class="label">${escapeHtml(label)}</div>
    <div class="value ${opts.small ? 'small' : ''}">${value}</div>
    ${opts.note ? `<div class="note">${opts.note}</div>` : ''}
  </div>`;
}

function renderTiles(all, agreed) {
  const online = all.filter(n => n.ok);
  const todo = online.reduce((sum, n) => sum + ((queueStats(n) || {}).todo || 0), 0);
  const pending = online.reduce((sum, n) => sum + ((queueStats(n) || {}).pending || 0), 0);

  document.getElementById('tiles').innerHTML = [
    tile('Nodes online', `${online.length}<span style="color:var(--muted)"> / ${all.length}</span>`),
    tile('Leader', escapeHtml(agreed.leader || '—'), {
      small: true,
      note: agreed.split ? chip('warning', 'nodes disagree') : '',
    }),
    tile('Work waiting', String(todo)),
    tile('In flight', String(pending)),
  ].join('');
}

// A completed job's description is the JSON of the Primes struct: a nested
// Range plus a chunk size. Read it defensively - it is the one piece of the
// reply whose exact shape is the server's, not ours.
function jobDescription(desc) {
  if (desc && typeof desc === 'object') {
    const range = desc.range;
    if (range && typeof range === 'object' && range.first != null && range.last != null) {
      const chunk = desc.chunk_size != null ? ` · chunk ${desc.chunk_size}` : '';
      return `primes ${range.first}–${range.last}${chunk}`;
    }
  }
  return 'job';
}

// "#Reference<0.1.2.3456>" -> "…3456"; the tail is enough to tell them apart.
function shortId(jobId) {
  const s = String(jobId);
  const match = s.match(/(\d+)>?\s*$/);
  return match ? `#${match[1]}` : s;
}

// The completed jobs any node reports, deduped by job id (only the leader
// really keeps the list, but leadership can move). Newest first is how each
// node already returns them, so preserve first-seen order.
function renderJobs(all) {
  const seen = new Set();
  const rows = [];
  for (const node of all) {
    for (const job of node.jobs || []) {
      const key = String(job.job_id);
      if (seen.has(key)) continue;
      seen.add(key);
      rows.push(job);
    }
  }

  document.getElementById('jobs-wrap').hidden = rows.length === 0;
  document.getElementById('jobs').innerHTML = rows.map(job => {
    const failed = job.result === 'failed';
    const value = failed
      ? chip('critical', 'failed')
      : `${escapeHtml(String(job.result))} primes`;
    return `<div class="job-row">
      <span>${escapeHtml(jobDescription(job.description))}
        <span class="job-id">${escapeHtml(shortId(job.job_id))}</span></span>
      <span>${value}</span>
      ${chip('good', 'done')}
    </div>`;
  }).join('');
}

function renderCard(node, agreed) {
  const name = node.name || node.target;
  const isLeader = node.ok && agreed.leader !== null && node.name === agreed.leader;
  const status = node.ok ? chip('good', 'online')
    : chip('critical', node.everSeen ? 'unreachable' : 'no answer yet');

  // The peer this node selected as leader - its own election result. When
  // views are split and this node's pick differs from the agreed leader, flag it.
  const picked = node.view ? node.view.leader : null;
  const pickedRow = picked === null ? '' : `<div class="row">
      <span class="k">selected peer</span>
      <span class="v">${escapeHtml(picked)}${agreed.split && picked !== agreed.leader ? ` ${chip('warning', '')}` : ''}</span>
    </div>`;

  const stats = queueStats(node);
  const queueRow = stats === null ? '' : `<div class="row">
      <span class="k">queue</span>
      <span class="v">${stats.todo} waiting &middot; ${stats.pending} in flight</span>
    </div>`;

  const peers = Object.entries((node.view && node.view.peers) || {});
  const peerRows = peers.map(([peer, peerStatus]) => `<div class="row">
      <span class="k">${peerStatus === 'online' ? chip('good', '') : chip('critical', '')}</span>
      <span class="v">${escapeHtml(peer)} <span class="warn">${escapeHtml(peerStatus)}</span></span>
    </div>`).join('');
  const peersBlock = `<div class="peers">
      <div class="cap">${peers.length ? 'peers' : 'no peers discovered yet'}</div>
      ${peerRows}
    </div>`;

  return `<article class="card ${node.ok ? '' : 'gone'}">
    <h2><span>${escapeHtml(name)}</span>${isLeader ? '<span class="badge">leader</span>' : ''}</h2>
    ${status}
    <div class="body">
      <div class="rows">
        ${pickedRow}
        ${queueRow}
        ${peersBlock}
      </div>
    </div>
  </article>`;
}

function render() {
  const all = [...nodes.values()].sort(byTarget);
  const agreed = consensus();

  document.getElementById('hint').hidden = true;
  document.getElementById('tiles').hidden = false;
  renderTiles(all, agreed);
  renderJobs(all);
  document.getElementById('cards').innerHTML = all.map(n => renderCard(n, agreed)).join('');

  // Keep the submit form's "where this goes" note current without re-rendering
  // the form (which would clobber whatever is being typed).
  const targetNote = document.getElementById('submit-target');
  if (targetNote) {
    const node = submitTarget();
    targetNote.textContent = node
      ? `→ ${node.name === agreed.leader ? 'leader ' : ''}${node.name || node.target}`
      : '→ no reachable node';
  }

  document.getElementById('foot-text').textContent =
    `watching ${seed} · every ${POLL_MS / 1000}s · last update ${new Date().toLocaleTimeString()}`;
}

// Accepts "10.0.0.7", "10.0.0.7:8123", or a pasted "http://10.0.0.7/".
// A bare host gets the default API port appended.
function normalizeSeed(raw) {
  const trimmed = raw.trim().replace(/^https?:\/\//, '').replace(/\/.*$/, '');
  if (!trimmed) return null;
  return trimmed.includes(':') ? trimmed : `${trimmed}:${API_PORT}`;
}

function watch(raw) {
  const normalized = normalizeSeed(raw);
  if (!normalized) return;
  seed = normalized;
  nodes.clear();
  localStorage.setItem('nano-seed', seed);
  document.getElementById('seed').value = seed;
  renderSubmit();
  poll();
}

document.getElementById('seed-form').addEventListener('submit', event => {
  event.preventDefault();
  watch(document.getElementById('seed').value);
});

setInterval(poll, POLL_MS);

const remembered = new URLSearchParams(location.search).get('seed')
  || localStorage.getItem('nano-seed');
if (remembered) watch(remembered);
</script>
</body>
</html>
